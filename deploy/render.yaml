# Loffice Engine — Render Web Service (Docker + LibreOffice)
services:
  - type: web
    name: loffice-engine
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LIBREOFFICE_PATH
        value: /usr/bin/soffice
      - key: WOPI_HOST
        value: https://loffice-engine.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://mvtkfefmqmsvkhltzyqi.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: COLLABORA_URL
        sync: false
