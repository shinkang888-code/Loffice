# Loffice — Collabora Online (LibreOfficeKit 편집 엔진)
# Usage: docker compose up -d
services:
  collabora:
    image: collabora/code:24.04.13.3.1
    container_name: loffice-collabora
    ports:
      - "9980:9980"
    environment:
      - aliasgroup1=http://localhost:3001
      - aliasgroup2=http://host.docker.internal:3001
      - username=admin
      - password=loffice_admin
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:welcome.enable=false --o:user_interface.use_integration_theme=false
      - dictionaries=en_US ko_KR
    cap_add:
      - MKNOD
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
